<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personalized Dashboard</title>
    <style>
        :root {
            --primary: #ffffff;
            --secondary: rgba(255, 255, 255, 0.1);
            --accent: #6d5dfc;
            --text: #ffffff;
            --bg-blend: rgba(0, 0, 0, 0.3);
        }

        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text);
        }

        .background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('background.png') center/cover no-repeat;
            filter: brightness(0.7);
            z-index: -1;
        }

        .dashboard-container {
            text-align: center;
            padding: 3rem;
            border-radius: 2rem;
            background: var(--secondary);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            animation: fadeIn 1s ease-out;
        }

        h1 {
            font-size: 3rem;
            margin: 0;
            font-weight: 800;
            letter-spacing: -2px;
            color: var(--primary);
            text-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .clock {
            font-size: 5rem;
            font-weight: 200;
            margin: 0.5rem 0;
        }

        .greeting {
            font-size: 1.2rem;
            opacity: 0.8;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .search-box {
            margin-top: 2rem;
            width: 100%;
            max-width: 500px;
        }

        input[type="text"] {
            width: 100%;
            padding: 1rem 1.5rem;
            border-radius: 2rem;
            border: none;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        input[type="text"]:focus {
            background: rgba(255, 255, 255, 0.25);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            transform: translateY(-2px);
        }

        input[type="text"]::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .quick-links {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
            justify-content: center;
        }

        .link-item {
            padding: 0.8rem 1.2rem;
            border-radius: 0.8rem;
            background: rgba(255, 255, 255, 0.1);
            cursor: pointer;
            transition: all 0.2s ease-out;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-decoration: none;
            color: white;
            font-size: 0.9rem;
        }

        .link-item:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body>
    <div class="background"></div>
    <div class="dashboard-container">
        <div class="greeting" id="greeting">Loading...</div>
        <div class="clock" id="clock">00:00</div>
        <h1>Personal Dashboard</h1>

        <div class="search-box">
            <form action="https://www.google.com/search" method="GET">
                <input type="text" name="q" placeholder="Type to search..." autocomplete="off">
            </form>
        </div>

        <div class="quick-links">
            <a href="https://github.com" class="link-item">GitHub</a>
            <a href="https://gmail.com" class="link-item">Gmail</a>
            <a href="https://youtube.com" class="link-item">YouTube</a>
        </div>
    </div>

    <script src="newtab.js"></script>
</body>

</html>
